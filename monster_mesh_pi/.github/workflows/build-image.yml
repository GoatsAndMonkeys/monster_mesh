# Build the Monster Nix Pi SD image in CI and publish as a release asset.
#
# Triggers:
#   - On any tag matching v*  → builds and uploads to the matching release
#   - Manually via the Actions tab (workflow_dispatch) for testing
#
# Why CI matters for distribution: end users should never need to install
# Docker or run a 30-minute qemu build.  They download the released
# .img.xz, flash, done.  This workflow is what makes that possible.

name: build-image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      base_image_url:
        description: 'Base RetroPie image URL (leave blank for default)'
        required: false
        default: ''
      autolaunch:
        description: 'Auto-launch MonsterMesh on boot (skip ES carousel)'
        required: false
        default: '0'

jobs:
  build:
    # ubuntu-22.04 ships with KVM + binfmt support enabled — needed for qemu-arm
    # in the chroot to be tolerable in terms of speed.
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Enable qemu-user-static for cross-arch chroot
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build the builder image
        run: docker build -t monster-nix-builder image-build/

      - name: Bake the SD image
        env:
          MONSTERMESH_AUTOLAUNCH: ${{ github.event.inputs.autolaunch || '0' }}
        run: |
          # Linux CI doesn't have the macOS virtio-fs bug, but using the
          # same wrapper as devs use keeps the build path single-sourced.
          BASE_FLAG=""
          if [ -n "${{ github.event.inputs.base_image_url }}" ]; then
            BASE_FLAG="--base ${{ github.event.inputs.base_image_url }}"
          fi
          ./image-build/host-build.sh $BASE_FLAG

      - name: List produced artifacts
        run: ls -lh image-build/dist/

      # On tag pushes, upload to the matching GitHub release.
      - name: Upload to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            image-build/dist/*.img.xz
            image-build/dist/*.sha256
          body: |
            Flashable Monster Nix image for Raspberry Pi Zero 2W in the
            RetroFlag GPI Case 2W.

            **Flash with [Balena Etcher](https://etcher.balena.io/):**
            1. Download `monster-nix-pi-zero-2w-*.img.xz`
            2. Etcher → "Flash from file" → select the `.xz`; Etcher decompresses
               on the fly
            3. Flash to your microSD
            4. Slide power on, wait ~60s for first-boot expansion, play

            Verify the download with the matching `.sha256`.

      # On manual runs, upload as a workflow artifact instead so we can
      # smoke-test before tagging.
      - name: Upload as workflow artifact (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: monster-nix-image
          path: |
            image-build/dist/*.img.xz
            image-build/dist/*.sha256
          retention-days: 14
