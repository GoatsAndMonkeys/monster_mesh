<!DOCTYPE html>
<html>
<head>
<style>
@font-face {
  font-family: 'UNSCII';
  src: url('https://fonts.cdnfonts.com/css/unscii') format('woff2');
}
body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.screen {
  width: 320px; height: 240px;
  background: #081820;
  position: relative;
  font-family: 'Courier New', monospace;
  font-size: 16px;
  image-rendering: pixelated;
  border: 3px solid #555;
  border-radius: 8px;
  overflow: hidden;
}
.border-box {
  position: absolute;
  left: 6px; top: 6px;
  width: 308px; height: 228px;
  background: #E0F8D0;
  border-radius: 4px;
}
.inner {
  position: absolute;
  left: 3px; top: 3px;
  width: 302px; height: 222px;
  background: #346856;
  border-radius: 2px;
}
.title-bar {
  width: 302px; height: 20px;
  background: #88C070;
  display: flex; align-items: center; justify-content: center;
  color: #081820;
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 2px;
}
.file-list {
  padding: 4px 8px;
  color: #E0F8D0;
  line-height: 1.3;
  font-size: 16px;
}
.file-list .row { white-space: nowrap; }
.dir { color: #88C070; }
.rom-save { color: #E0F8D0; }
.rom-nosave { color: #88C070; }
.eject { color: #081820; }
.footer-bar {
  position: absolute;
  bottom: 0; left: 0;
  width: 302px; height: 20px;
  background: #88C070;
  display: flex; align-items: center; justify-content: center;
  color: #081820;
  font-size: 14px;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="screen">
  <div class="border-box">
    <div class="inner">
      <div class="title-bar">&lt; GAME PAK &gt;</div>
      <div class="file-list">
        <div class="row">   <span class="dir">[..]</span></div>
        <div class="row">   <span class="eject">[Eject Cart]</span></div>
        <div class="row">   <span class="dir">[roms]</span></div>
        <div class="row">&gt;&gt; <span class="rom-save">Pokemon Red.gb [SAV]</span></div>
        <div class="row">   <span class="rom-save">Pokemon Blue.gb [SAV]</span></div>
        <div class="row">   <span class="rom-nosave">Pokemon Yellow.gbc</span></div>
        <div class="row">   <span class="rom-nosave">Tetris.gb</span></div>
        <div class="row">   <span class="rom-nosave">Links Awakening.gb</span></div>
        <div class="row">   <span class="rom-save">Super Mario Land.gb [SAV]</span></div>
      </div>
      <div class="footer-bar">W/S:Nav K:Select ALT:Meshtastic</div>
    </div>
  </div>
</div>
</body>
</html>
