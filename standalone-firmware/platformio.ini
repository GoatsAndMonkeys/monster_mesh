; PokeMesh — Standalone Pokémon + LoRa battle firmware for LilyGO T-Deck
; ESP32-S3FN16R8 | 8MB PSRAM | 320x240 ST7789V | SX1262 LoRa | QWERTY keyboard

[platformio]
default_envs = t-deck

; ────────────────────────────────────────────────────────────
[env:t-deck]
platform  = platformio/espressif32@6.11.0
board     = esp32s3box               ; S3 + 16MB flash + 8MB OPI PSRAM (matches T-Deck)
board_build.partitions = default_16MB.csv
framework = arduino

; Override board MCU/flash from generic S3 box defaults to match T-Deck
board_build.mcu          = esp32s3
board_build.f_cpu        = 240000000L
board_build.f_flash      = 80000000L
board_build.flash_mode   = qio
board_build.psram_type   = opi       ; OPI PSRAM on T-Deck (8MB)
board_build.arduino.memory_type = qio_opi

upload_protocol  = esptool
upload_speed     = 921600
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder

board_build.filesystem = littlefs

build_flags =
    ; ── Core ESP32-S3 flags ──────────────────────────────
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3             ; WARN in release, set to 5 for verbose
    -std=gnu++17

    ; ── TFT_eSPI configuration (ST7789V 320x240) ────────
    ; Pin configuration comes from pins.h and the -D flags below.
    ; (The variants/tdeck/ directory has been removed — it had wrong esp32s3box
    ; defaults. All pin values are supplied via build flags and pins.h.)
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_CS=12
    -DTFT_DC=11
    -DTFT_RST=-1
    -DTFT_MOSI=41
    -DTFT_SCLK=40
    -DTFT_MISO=38
    -DTFT_BL=42
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000

    ; ── Peanut-GB ────────────────────────────────────────
    ; HEADER_ONLY = declarations only in every TU except peanut_gb_impl.cpp,
    ; which is the one translation unit that compiles the implementations.
    ; Without this flag every .cpp that includes peanut_gb.h gets duplicate
    ; function definitions → ODR linker errors.
    -DPEANUT_GB_HEADER_ONLY=1
    -DENABLE_SOUND=0                 ; disable audio in Phase 1
    -DPEANUT_GB_HIGH_LCD_ACCURACY=0  ; faster, good enough for Pokémon
    -DGB_COLOUR_ONLY=0               ; support DMG (non-colour) mode

    ; ── Xtensa IRAM ISR literal-pool fix ─────────────────
    ; Prevents "dangerous relocation: l32r: literal placed after use" errors
    ; that occur when IRAM functions reference data-section literals.
    -mlongcalls

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    jgromes/RadioLib@^6.6.0

lib_ldf_mode = deep+

build_src_filter =
    +<*>
    -<.git/>
    -<main_gym.cpp>
    -<boot_test.cpp>

; ────────────────────────────────────────────────────────────
; Boot test — backlight blink, no game firmware
; Build: pio run -e boot-test
[env:boot-test]
platform  = platformio/espressif32@6.11.0
board     = esp32s3box
board_build.partitions = default_16MB.csv
framework = arduino

board_build.mcu          = esp32s3
board_build.f_cpu        = 240000000L
board_build.f_flash      = 80000000L
board_build.flash_mode   = qio
board_build.psram_type   = opi
board_build.arduino.memory_type = qio_opi

upload_protocol  = esptool
upload_speed     = 921600
monitor_speed    = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -mlongcalls

build_src_filter =
    +<boot_test.cpp>

; ────────────────────────────────────────────────────────────
; Mesh Gym — headless tournament coordinator (ESP32-S3 + SX1262, no display)
; Build: pio run -e mesh-gym
[env:mesh-gym]
platform  = platformio/espressif32@6.11.0
board     = esp32s3box
framework = arduino

board_build.mcu          = esp32s3
board_build.f_cpu        = 240000000L
board_build.f_flash      = 80000000L
board_build.flash_mode   = qio

upload_protocol  = esptool
upload_speed     = 921600
monitor_speed    = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -mlongcalls
    -DMESH_GYM_BUILD=1

lib_deps =
    jgromes/RadioLib@^6.6.0

lib_ldf_mode = deep+

build_src_filter =
    +<main_gym.cpp>
    +<SX1262Transport.cpp>
    +<TournamentCoordinator.h>
    +<BattlePacket.h>
    +<RadioTransport.h>
    +<pins.h>
