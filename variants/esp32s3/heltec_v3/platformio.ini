; ── Heltec WiFi LoRa 32 V3 — pen-test Pikachu + MMG gym build ───────────────
;
; ALL-IN ESP32 build:
;   - Pocket Pikachu virtual pet (mono OLED renderer)
;   - MonsterMesh Gauntlet gym module (DM admin + on-device slide)
;   - Pen-test scanner (promiscuous WiFi, vuln classifier, War Stroller frame)
;   - Future: Gen1BattleEngine + dungeon door
;
; MonsterMesh back-channel is baked in via USERPREFS (channel 1, PSK
; "MonsterMesh!2024"). MQTT defaults to MonsterMesh's EMQX cluster — already
; hardcoded in src/mesh/Default.h, just enable the module.
;
; Pen-test mode only runs when the user toggles it on from the War Stroller
; frame; Meshtastic owns WiFi otherwise.

[env:heltec-v3]
extends = esp32s3_base
board = heltec_wifi_lora_32_V3
board_level = pr
board_check = true
board_build.partitions = default_8MB.csv
build_flags =
  ${esp32s3_base.build_flags}
  -D HELTEC_V3
  -I variants/esp32s3/heltec_v3
  ; ── Re-enable the modules globally excluded in platformio.ini's
  ;    [arduino_base].build_flags so this build can use them.
  -UMESHTASTIC_EXCLUDE_POCKETPIKACHU
  -UMESHTASTIC_EXCLUDE_GAUNTLET
  -UMESHTASTIC_EXCLUDE_PENTEST
  ; ── MonsterMesh back-channel (channel 1, PSK base64
  ;    "TW9uc3Rlck1lc2ghMjAyNA==" = ASCII "MonsterMesh!2024").
  '-DUSERPREFS_CHANNELS_TO_WRITE=2'
  '-DUSERPREFS_CHANNEL_1_NAME="MonsterMesh"'
  '-DUSERPREFS_CHANNEL_1_PSK={ 0x4D, 0x6F, 0x6E, 0x73, 0x74, 0x65, 0x72, 0x4D, 0x65, 0x73, 0x68, 0x21, 0x32, 0x30, 0x32, 0x34 }'
  '-DUSERPREFS_CHANNEL_1_UPLINK_ENABLED=false'
  '-DUSERPREFS_CHANNEL_1_DOWNLINK_ENABLED=false'
  ; ── MQTT defaults: MonsterMesh EMQX cluster, encrypted, server-only.
  ;    Address / username / password come from src/mesh/Default.h
  ;    (sf17b671.ala.us-east-1.emqxsl.com / ash / large4meowth).
  '-DUSERPREFS_MQTT_ENABLED=1'
  '-DUSERPREFS_MQTT_ENCRYPTION_ENABLED=true'
  '-DUSERPREFS_MQTT_TLS_ENABLED=false'

build_src_filter =
  ${esp32_base.build_src_filter}
  ; Drop the non-gauntlet MonsterMesh sources (T-Deck-only UI bits).
  -<modules/monstermesh/MonsterMeshAudio.cpp>
  -<modules/monstermesh/MonsterMeshEmulator.cpp>
  -<modules/monstermesh/MonsterMeshModule.cpp>
  -<modules/monstermesh/MonsterMeshTerminal.cpp>
  -<modules/monstermesh/MonsterMeshTextBattle.cpp>
  -<modules/monstermesh/PokemonDaycare.cpp>
  -<modules/monstermesh/DaycareEventGen.cpp>
  -<modules/monstermesh/Lord*.cpp>
  -<modules/monstermesh/dungeon/>
  ; Re-include what this build does use.
  +<modules/monstermesh/gauntlet/>
  +<modules/monstermesh/Gen1BattleEngine.cpp>
  +<modules/monstermesh/Gen1Species.cpp>
  +<modules/pikachu/>
  +<modules/pentest/>
