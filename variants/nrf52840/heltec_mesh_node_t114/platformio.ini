; First prototype nrf52840/sx1262 device
[env:heltec-mesh-node-t114]
extends = nrf52840_base
board = heltec_mesh_node_t114
board_level = pr
debug_tool = jlink

# add -DCFG_SYSVIEW if you want to use the Segger systemview tool for OS profiling.
build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/heltec_mesh_node_t114
  -DHELTEC_T114

build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/heltec_mesh_node_t114>
lib_deps =
  ${nrf52840_base.lib_deps}
  lewisxhe/PCF8563_Library@^1.0.1
  https://github.com/meshtastic/st7789/archive/bd33ea58ddfe4a5e4a66d53300ccbd38d66ac21f.zip

; ── Heltec T114 Pet Pikachu (color, BLE-scan future) ─────────────────────
; Adds the pet + gauntlet + (eventual) BLE pen-test on top of the standard
; t114 build. Cuts MQTT (no WiFi anyway) and the heavyweight telemetry
; sensors. Color TFT rendering path is TODO — module currently builds
; only if PocketPikachu's OLEDDisplay shim is wired up for ST7789.
[env:heltec-t114-pet]
extends = nrf52840_base
board = heltec_mesh_node_t114
board_level = pr
build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/heltec_mesh_node_t114
  -DHELTEC_T114
  ; Pull in the gauntlet + T114 color-TFT pet variant (pikachu2). The
  ; old monochrome PocketPikachu module is left OUT — T114 uses the
  ; PocketPikachu2 module designed for the 240x135 ST7789 (currently
  ; rendered as a monochrome silhouette; Phase 2b TODO for full 4-color).
  -DMESHTASTIC_EXCLUDE_POCKETPIKACHU
  -UMESHTASTIC_EXCLUDE_POCKETPIKACHU2
  -UMESHTASTIC_EXCLUDE_GAUNTLET
  -UMESHTASTIC_EXCLUDE_PENTEST
  ; T114 has no WiFi — MQTT is dead weight. Frees ~20 KB to make room for
  ; pikachu2 + the BLE pen-test scanner.
  -DMESHTASTIC_EXCLUDE_MQTT
  ; Additional trims so the BLE pentest + classifier (~30 KB) fits in the
  ; remaining 815104 B of flash. Each of these is dead-weight on a T114
  ; (no WiFi for MQTT/storage uplink, no environmental sensors wired,
  ; specialised modules with niche audiences):
  -DMESHTASTIC_EXCLUDE_STOREFORWARD
  -DMESHTASTIC_EXCLUDE_ENVIRONMENTAL_SENSOR
  -DMESHTASTIC_EXCLUDE_POWER_TELEMETRY
  -DMESHTASTIC_EXCLUDE_ATAK
  -DMESHTASTIC_EXCLUDE_WAYPOINT
  -DMESHTASTIC_EXCLUDE_RANGETEST
  -DMESHTASTIC_EXCLUDE_DROPZONE
  ; Drops the 6 modules the user confirmed safe (no speaker, no health
  ; sensor, no PAX use case, no remote-hardware control, dev-only stress
  ; test, no detection sensor wired). EXTERNALNOTIFICATION, CANNEDMESSAGES,
  ; NEIGHBORINFO and TRACEROUTE are KEPT (user marked them needed).
  -DMESHTASTIC_EXCLUDE_AUDIO
  -DMESHTASTIC_EXCLUDE_HEALTH_TELEMETRY
  -DMESHTASTIC_EXCLUDE_POWERSTRESS
  -DMESHTASTIC_EXCLUDE_REMOTEHARDWARE
  -DMESHTASTIC_EXCLUDE_PAXCOUNTER
  -DMESHTASTIC_EXCLUDE_DETECTIONSENSOR
  ; Pokewalker B&W theme: black on white. Sprites still get colour via
  ; the per-species GBC custom palette through Tft4ColorBlit.
  -DTFT_MESH_OVERRIDE=0x0000
  ; MonsterMesh back-channel + MQTT defaults (same as heltec-v3).
  '-DUSERPREFS_CHANNELS_TO_WRITE=2'
  '-DUSERPREFS_CHANNEL_1_NAME="MonsterMesh"'
  '-DUSERPREFS_CHANNEL_1_PSK={ 0x4D, 0x6F, 0x6E, 0x73, 0x74, 0x65, 0x72, 0x4D, 0x65, 0x73, 0x68, 0x21, 0x32, 0x30, 0x32, 0x34 }'
  '-DUSERPREFS_CHANNEL_1_UPLINK_ENABLED=false'
  '-DUSERPREFS_CHANNEL_1_DOWNLINK_ENABLED=false'

build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/heltec_mesh_node_t114>
  ; Drop the same MonsterMesh sources that heltec-v3 excludes.
  -<modules/monstermesh/MonsterMeshAudio.cpp>
  -<modules/monstermesh/MonsterMeshEmulator.cpp>
  -<modules/monstermesh/MonsterMeshModule.cpp>
  -<modules/monstermesh/MonsterMeshTerminal.cpp>
  -<modules/monstermesh/MonsterMeshTextBattle.cpp>
  -<modules/monstermesh/PokemonDaycare.cpp>
  -<modules/monstermesh/DaycareEventGen.cpp>
  -<modules/monstermesh/Lord*.cpp>
  -<modules/monstermesh/dungeon/>
  +<modules/monstermesh/gauntlet/>
  +<modules/monstermesh/Gen1BattleEngine.cpp>
  +<modules/monstermesh/Gen1Species.cpp>
  ; T114 color-TFT pet (rendered monochrome — Phase 2b TODO for 4-color blit).
  +<modules/pikachu2/>
  ; Monochrome pikachu/ (OLED-only) intentionally skipped on T114.
  ; BLE pen-test (Bluefruit.Scanner Observer instead of 802.11 promiscuous).
  ; WifiScanner.cpp + BeaconClassifier.cpp self-exclude via #if ARCH_ESP32
  ; so they're safe to include in the compile unit list.
  +<modules/pentest/>

lib_deps =
  ${nrf52840_base.lib_deps}
  lewisxhe/PCF8563_Library@^1.0.1
  https://github.com/meshtastic/st7789/archive/bd33ea58ddfe4a5e4a66d53300ccbd38d66ac21f.zip